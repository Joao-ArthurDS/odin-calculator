<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="calculator">
        <div id="screen"> 
            <input type="text" style="flex: 1;" id="visor" value="0" dir="rtl" readonly> 
        </div>    
        <div id="operations_group">
            <button class="operations" id="sum">+</button>
            <button class="operations" id="subtract">-</button>
            <button class="operations" id="multiply">x</button>
            <button class="operations" id="divide">/</button>
        </div>
        <div id="numbers_result">
            <div id="numbers_group"> 
                <button class="numbers" id="7">7</button>
                <button class="numbers" id="8">8</button>
                <button class="numbers" id="9">9</button>
                <button class="numbers" id="4">4</button>
                <button class="numbers" id="5">5</button>
                <button class="numbers" id="6">6</button>                
                <button class="numbers" id="1">1</button>
                <button class="numbers" id="2">2</button>
                <button class="numbers" id="3">3</button>
                <button class="numbers" id="0">0</button>
                <button class="numbers" id="dot">.</button>
            </div>
            <div id="finishers_group">
                <button class="finishers" id="result">=</button>
                <button class="finishers" id="clear">C</button>
            </div>
        </div>
    </div>
</body>
</html>
